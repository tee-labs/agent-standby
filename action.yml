name: 'Agent Standby'
description: 'Initialize AI agent configuration, environment variables, and skills for CI'
author: 'mccxj'

inputs:
  agent_type:
    description: 'Agent type: opencode or claude'
    required: false
    default: 'opencode'
  replace_env:
    description: 'Replace {env:VAR} placeholders in config files with environment variable values (prompts if not set)'
    required: false
    default: 'false'

outputs:
  config_dir:
    description: 'Path to the agent config directory'
  skills_dir:
    description: 'Path to the synced skills directory'
  agent_type:
    description: 'The agent type that was configured'

runs:
  using: 'node20'
  main: 'dist/index.js'

branding:
  icon: 'zap'
  color: 'blue'
