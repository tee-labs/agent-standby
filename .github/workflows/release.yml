name: Release

on:
  push:
    branches:
      - main
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build (ncc bundle)
        run: npm run build

      - name: Commit dist/ back to repository
        run: |
          git config --global user.name "opencode-agent[bot]"
          git config --global user.email "opencode-agent[bot]@users.noreply.github.com"
          git add dist/
          if git diff --cached --quiet; then
            echo "No changes to dist/, skipping commit."
          else
            git commit -m "chore: update dist/ bundle [skip ci]"
            git push
          fi
          git tag -f latest
          git push origin latest --force

      - name: Create Latest Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: Latest Build
          make_latest: true
          generate_release_notes: true

      - name: Publish to NPM
        if: github.event_name == 'release'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
